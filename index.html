<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Invitation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#f7f3eb;
font-family:Arial, sans-serif;
}

/* الصفحة الأولى */
#envelopePage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

#envelope{
width:min(80vw,500px);
transition:1s;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* الصفحة الثانية */
#codePage{
display:none;
width:100%;
height:100vh;
background:url('background.jpeg') center center/cover no-repeat;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
}

/* الفراولة المتحركة */
.strawberry{
position:absolute;
width:80px;
animation:move 8s ease-in-out infinite;
}

.s1{
top:10%;
left:10%;
}

.s2{
bottom:15%;
right:10%;
animation-delay:2s;
}

@keyframes move{
0%,100%{
transform:translateY(0px) rotate(0deg);
}
50%{
transform:translateY(-20px) rotate(8deg);
}
}

.lock{
width:180px;
margin-bottom:20px;
}

input{
width:220px;
height:45px;
border:none;
border-radius:10px;
font-size:24px;
text-align:center;
margin-bottom:15px;
}

button{
padding:12px 30px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
background:#fff;
}
</style>
</head>

<body>

<!-- صفحة الظرف -->
<div id="envelopePage">
<img src="envelope.jpeg" id="envelope">
</div>

<!-- صفحة الرمز -->
<div id="codePage">

<img src="strawberry.png" class="strawberry s1">
<img src="strawberry.png" class="strawberry s2">

<input type="password" id="code" placeholder="Secret Code">

<button onclick="checkCode()">❤️</button>

</div>

<script>

document.getElementById("envelopePage").onclick=function(){

document.getElementById("envelope").style.transform=
"scale(1.2) rotateX(90deg)";

setTimeout(()=>{
document.getElementById("envelopePage").style.display="none";
document.getElementById("codePage").style.display="flex";
},1000);

}

function checkCode(){

let code=document.getElementById("code").value;

if(code==="14062005"){
window.location.href="message.html";
}
else{
alert("Wrong code ❤️");
}

}

</script>

</body>
</html>
