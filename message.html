<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Invitation</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('invitation.jpeg');
    background-size:cover;
    background-position:center;
    font-family:Georgia, serif;
}

.message{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(5px);
    padding:25px;
    border-radius:20px;
    color:white;
    text-align:center;
    max-width:500px;
}

h1{
    font-size:40px;
}

p{
    font-size:22px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="message">
    <h1>🎂 You're Invited! 🎂</h1>

    <p>
        Join me to celebrate my birthday! ✨
    </p>

    <p>
        📅 Date: 14/06/2005<br>
        🕓 Time: 4:30 PM<br>
        📍 Location: Maison Aifas, Oran
    </p>

    <p>
        I would love to celebrate this special day with you. 💖
    </p>

    <h2>See you there! 🌹</h2>

    <h3>Narcisse 🌸</h3>
</div>

</body>
</html>
